{{define "race"}}
<!doctype html>
<html>
  <head>
    <title>Race</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }

      /* Container for the competing bar */
      .race-bar {
        display: flex;
        width: 100%;
        height: 40px;
        border-radius: 25px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        font-weight: bold;
        font-size: 1.1rem;
      }

      /* Common side styling */
      .me, .chat {
        display: flex;
        align-items: center;
        transition: flex-grow 0.5s ease; /* Smooth transition when scores change */
        padding: 0 20px;
        animation-duration: 1s;
        animation-timing-function: linear;
        background-size: 40px 40px;
      }

     @keyframes scroll {
         from {background-position: 0 0;}
         to {background-position: 80px 0px;}
     }
     @keyframes scroll-reverse {
         from {background-position: 0 0;}
         to {background-position: -80px 0px;}
     }

     /* Left Side: Me */
     .me {
        background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAAXNSR0IArs4c6QAAAGNQTFRFAAAAIiA0RSg8Zjkxj1Y733Em2aBm7sOa+/I2meVQar4wN5RuS2kvUkskMjw5Pz90MGCCW27hY5v/X83ky9v8////m623hH6HaWpqWVZSdkKKrDIy2Vdj13u6j5dKim8wAAAA+XnZwgAAACF0Uk5TAP//////////////////////////////////////////RvROpAAAAGRJREFUGJVdjlEOwDAIQrmBge7+Zx1i22TjQ/SVaPGsryDJpmtIXT1qkQZpu1sqKkCZXWsnxDAewFHvbIMfLM4VI1TZa7aYERMOSYtOG9iyyAlt0FecAi+ZFDjkgELlFzVig59ed8IRWYuWzGUAAAAASUVORK5CYII=');
        justify-content: flex-start;
        animation-name: scroll;
     }

     /* Right Side: Chat */
     .chat {
        background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAMAAAAoLQ9TAAAAAXNSR0IArs4c6QAAAMNQTFRFBgYIFBATOxclcxcttCAq3z4j+moK+aMb/9VB//xA1vJknNtDWcE1FKAuGno+JFI7EiAgFDRkKFzEJJ/eINbHpvzb/////vPA+ta49aCX6GpzvEqbeTqAQDNTJCI0IhwaMisocUE7u3VH26Rj9NKc2uDqs7nRi5OvbXWNSlRiMzlBQiQzWzE4jlJSunVq6bWj4+b/ub/7hJvkWI2+R32FI2dOMoRkXa+Nkty6zffi5NKqx7CLoIZieWdVWk5EQjk0AAAAJi4clQAAAEF0Uk5TAP////////////////////////////////////////////////////////////////////////////////////+uzSukAAAAY0lEQVQYlV2OUQ7AMAhCidDd/8hDbJtsfIi+Ei2e9RUk2XQNqatHLdIgbXdLRQUos2vthBjGAzjqnW3wg8W5YoQqe80WM2LCIWnRaQNbFjmhDfqKU+AlkwKHHFCo/KJGbPDTCxMCA4y+ldISAAAAAElFTkSuQmCC');
        justify-content: flex-end;
        animation-name: scroll-reverse;
      }

      .score {
        background-color: rgba(255, 255, 255, 0.2);
        padding: 2px 8px;
        border-radius: 10px;
        margin: 0 8px;
      }

     .flag {
        position: absolute;
        top: 15px;
        left: 50%;
        transition: left 0.5s ease;
      }
    </style>
  </head>
  <body>
    <div class="race-bar">
      <div class="me" style="flex-grow: {{.Me}};">
        Me <span class="score">{{.Me}}</span>
      </div>

      <div class="chat" style="flex-grow: {{.Chat}};">
        <span class="score">{{.Chat}}</span> Chat
      </div>

      <div class="flag">🏁</div>
    </div>

    <script type="text/javascript">
     // periodically call the server with same URL and replace the body with the response body new content
      function update() {
        fetch(window.location.href)
          .then(response => response.text())
          .then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.body.innerHTML = doc.body.innerHTML;
          })
          .catch(error => console.error('Error fetching race', error));
      }

      setInterval(update, 1000);
    </script>
  </body>
</html>
{{end}}
